<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Swarm Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        #log { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; background: #f9f9f9; }
        ul { list-style: none; padding: 0; }
        li { padding: 5px; background: #eee; margin: 2px 0; border-left: 5px solid #4CAF50; }
    </style>
</head>
<body>
    <h1>Agent Swarm Dashboard</h1>
    <div class="grid">
        <div>
            <h2>Active Agents</h2>
            <ul id="agent-list"></ul>
            <h2>Controls</h2>
            <input type="text" id="agent-input" placeholder="Target Agent ID">
            <button onclick="pingAgent()">Ping Agent</button>
        </div>
        <div>
            <h2>Live Activity Log</h2>
            <div id="log"></div>
        </div>
    </div>
    <script src="dashboard.js"></script>
    <script src="log-helper.js"></script>
</body>
</html>
